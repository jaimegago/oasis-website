baseURL: https://oasis-spec.dev/
title: "OASIS — Open Assessment Standard for Intelligent Systems"
languageCode: en

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    lineNos: false
    guessSyntax: false

languages:
  en:
    languageName: English
    contentDir: content/en
    weight: 1

module:
  imports:
    - path: github.com/alex-shpak/hugo-book

params:
  description: "An open standard for evaluating AI agents in real systems. Safety is a gate, not a score. v1.0.0-rc1 is out for review — feedback open."
  BookSearch: true
  BookTheme: auto
  BookToC: true
  BookSection: docs
  BookRepo: https://github.com/jaimegago/oasis-website
  BookEditPath: edit/main

  # Open Graph / Twitter Card social image (relative to static/)
  socialImage: og-image.png

  # Algolia DocSearch v4 — replace placeholder values with credentials from
  # https://dashboard.algolia.com after DocSearch approval.
  # In CI, these can be overridden via environment variables or repository secrets.
  algolia:
    appId: 4VAV4JJ1AH
    indexName: oasis-spec
    apiKey: 695aded87b54bba2a75f9df96c99ba66
    # SRI hashes for pinned CDN assets (generate with: openssl dgst -sha384 -binary <file> | openssl base64 -A)
    # Leave empty to skip integrity checks during development.
    cssSRI: ""
    jsSRI: ""
